name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: zip -r skill.zip blaxel/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: skill.zip
          generate_release_notes: true
