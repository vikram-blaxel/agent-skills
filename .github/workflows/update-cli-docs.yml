name: Update CLI docs

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cli-release]

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Blaxel CLI
        run: curl -fsSL https://raw.githubusercontent.com/blaxel-ai/toolkit/main/install.sh | sh

      - name: Verify CLI
        run: bl version

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate docs
        run: deno run --allow-run --allow-read --allow-write blaxel-cli/scripts/generate-docs.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          CLI_VERSION=$(bl version 2>&1 | grep 'Version:' | awk '{print $2}')
          BRANCH="automated/update-cli-docs-${CLI_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add blaxel-cli/
          git commit -m "docs: regenerate blaxel-cli references for CLI ${CLI_VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "docs: update blaxel-cli skill for CLI ${CLI_VERSION}" \
            --body "Auto-generated from CLI release ${CLI_VERSION}. Review the updated command references and merge when ready." \
            --assignee cploujoux
        env:
          GH_TOKEN: ${{ github.token }}
